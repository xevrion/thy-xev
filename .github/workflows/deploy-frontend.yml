name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Reload Nginx
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Build & reload
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: xevrion
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /home/xevrion/thy
            git fetch origin
            git reset --hard origin/main
            npm ci
            npm run build
            sudo systemctl reload nginx
