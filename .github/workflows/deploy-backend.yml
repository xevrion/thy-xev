name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Install & Restart PM2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: xevrion
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /home/xevrion/thy
            git fetch origin
            git reset --hard origin/main
            cd server
            npm ci
            pm2 restart xevrion-backend
            pm2 save
